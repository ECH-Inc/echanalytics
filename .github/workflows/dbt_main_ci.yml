name: dbt Snowflake Main CI
on:
  # Trigger when a PR is created or updated the target main branch
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  dbt-main-ci:
    runs-on: ubuntu-latest
    environment: production
    env:
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        SNOWFLAKE_DB: ${{ secrets.SNOWFLAKE_DB }}
        SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        SNOWFLAKE_WH: ${{ secrets.SNOWFLAKE_WH }}
        SNOWFLAKE_CLIENT_ID: ${{ secrets.SNOWFLAKE_CLIENT_ID }}
        SNOWFLAKE_CLIENT_SECRET: ${{ secrets.SNOWFLAKE_CLIENT_SECRET }}
        SNOWFLAKE_REFRESH_TOKEN: ${{ secrets.SNOWFLAKE_REFRESH_TOKEN }}
        DBT_SCHEMA: "CI_${{ github.event.pull_request.number || 'PROD' }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.12'
        
      - name: Install dbt Adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.10.15 dbt-snowflake==1.10.3

      - name: Install dbt packages
        run: dbt deps

      # Build temporary profile for final PR testing
      - name: Build dbt Profiles
        run: |
          mkdir -p ~/.dbt
          echo "default:
            outputs:
              ci_cd:
                type: snowflake
                authenticator: oauth
                oauth_client_id: SNOWFLAKE_CLIENT_ID
                oauth_client_secret: SNOWFLAKE_CLIENT_SECRET
                token: SNOWFLAKE_REFRESH_TOKEN
                account: $SNOWFLAKE_ACCOUNT
                role: $SNOWFLAKE_ROLE
                user: $SNOWFLAKE_USER
                database: $SNOWFLAKE_DATABASE
                warehouse: $SNOWFLAKE_WAREHOUSE
                schema: $DBT_SCHEMA
                threads: 1
            target: ci_cd" > ~/.dbt/profiles.yml

      # TEST: Run on Pull Requests (Slim CI)
      - name: Run dbt Build
        run: dbt build # Fallback to full build if no manifest exists