name: dbt Snowflake Master CI
on:
  # Trigger when a PR is created or updated the target master branch
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  dbt-master-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    environment: development
    env:
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        SNOWFLAKE_DB: ${{ secrets.SNOWFLAKE_DB }}
        SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        SNOWFLAKE_WH: ${{ secrets.SNOWFLAKE_WH }}
        SNOWFLAKE_CLIENT_ID: ${{ secrets.SNOWFLAKE_CLIENT_ID }}
        SNOWFLAKE_CLIENT_SECRET: ${{ secrets.SNOWFLAKE_CLIENT_SECRET }}
        SNOWFLAKE_REFRESH_TOKEN: ${{ secrets.SNOWFLAKE_REFRESH_TOKEN }}
        DBT_SCHEMA: "CI_${{ github.event.pull_request.number || 'MASTER_CI' }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.12'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install dbt Adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.10.15 dbt-snowflake==1.10.3

      - name: Install dbt packages
        run: dbt deps

      - name: Find latest successful run on master
        id: latest_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh api repos/${{ github.repository }}/actions/runs \
            --jq '.workflow_runs
                 | map(select(.head_branch=="master" and .conclusion=="success"))
                 | .[0].id')
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful runs found on master"
            echo "has_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Discovered run-id=$run_id"
            echo "has_run=true" >> "$GITHUB_OUTPUT"
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi

      # Build temporary profile for final PR testing
      - name: Build dbt Profiles
        run: |
          mkdir -p ~/.dbt
          echo "echanalytics:
            outputs:
              ci_cd:
                type: snowflake
                authenticator: oauth
                oauth_client_id: SNOWFLAKE_CLIENT_ID
                oauth_client_secret: SNOWFLAKE_CLIENT_SECRET
                token: SNOWFLAKE_REFRESH_TOKEN
                account: $SNOWFLAKE_ACCOUNT
                role: $SNOWFLAKE_ROLE
                user: $SNOWFLAKE_USER
                database: $SNOWFLAKE_DATABASE
                warehouse: $SNOWFLAKE_WAREHOUSE
                schema: $DBT_SCHEMA
                threads: 1
            target: ci_cd" > ~/.dbt/profiles.yml
          
          # Point dbt at this temporary profile directory for subsequent steps
          echo "DBT_PROFILES_DIR=$PWD/.ci/profiles" >> $GITHUB_ENV

      
      - name: dbt debug (with temp profile)
        run: dbt debug --profiles-dir "$DBT_PROFILES_DIR"

      - name: dbt compile (with temp profile)
        run: dbt compile --profiles-dir "$DBT_PROFILES_DIR"

      - name: Download Previous Manifest
        # Fetches manifest from the last successful CI run for state comparison
        if: steps.latest_run.outputs.has_run == 'true'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dbt-manifest
          run-id: ${{ steps.latest_run.outputs.run_id }}
          path: ./state
          github-token: ${{ github.token }}

      - name: Display structure of downloaded files
        run: ls -lah ./state || true
      # TEST: Run on Pull Requests (Slim CI)
      - name: Run dbt Build
        run: |
          if [ -f "./state/manifest.json" ]; then
            echo "Found previous manifest -> using state to build modified models"
            dbt build --profiles-dir "$DBT_PROFILES_DIR" --select state:modified --state ./state
          else
            echo "No previous manifest -> building all"
            dbt build --profiles-dir "$DBT_PROFILES_DIR" # Fallback to full build if no manifest exists
          fi

      - name: Cleanup CI Schema
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          dbt run-operation drop_schema_operation \
            --args '{"schema_name": "'"${DBT_SCHEMA}"'"}' \
            --profiles-dir "$DBT_PROFILES_DIR"