name: dbt Snowflake Dev CI
on:
  # Trigger when a PR is created or updated the target dev branch
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Allow manual trigger if required
  
  # Trigger when code is merged or pushed directly to dev branch
  push:
    branches: [dev]

jobs:
  dbt-dev-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    environment: development
    env:
        SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        SNOWFLAKE_DB: ${{ secrets.SNOWFLAKE_DB }}
        SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        SNOWFLAKE_WH: ${{ secrets.SNOWFLAKE_WH }}
        SNOWFLAKE_CLIENT_ID: ${{ secrets.SNOWFLAKE_CLIENT_ID }}
        SNOWFLAKE_CLIENT_SECRET: ${{ secrets.SNOWFLAKE_CLIENT_SECRET }}
        SNOWFLAKE_REFRESH_TOKEN: ${{ secrets.SNOWFLAKE_REFRESH_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install dbt Adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.10.15 dbt-snowflake==1.10.3

      - name: Install dbt packages
        run: dbt deps

      - name: Run dbt debug (Verify Connection)
        run: dbt debug

      - name: Run dbt compile
        run: dbt compile --profiles-dir .


      # Find latest successful run on master
      - name: Find latest successful run on master
        id: latest_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh api repos/${{ github.repository }}/actions/runs \
            --jq '.workflow_runs
                 | map(select(.head_branch=="master" and .conclusion=="success"))
                 | .[0].id')
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful runs found on master"
            echo "has_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Discovered run-id=$run_id"
            echo "has_run=true" >> "$GITHUB_OUTPUT"
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Previous Manifest
        # Fetches manifest from the last successful CI run for state comparison
        if: steps.latest_run.outputs.has_run == 'true'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: dbt-manifest
          run-id: ${{ steps.latest_run.outputs.run_id }}
          path: ./state
          github-token: ${{ github.token }}

      - name: Display structure of downloaded files
        run: ls -lah ./state || true


      - name: dbt Build (Development)
        run: |
          if [ -f " ./state/manifest.json" ]; then
            echo "Found previous manifest -> using state to build modified models"
            dbt build --target dev --select state:modified --state ./state
          else
            echo "No previous manifest -> building all"
            dbt build --target dev # Fallback to full build if no manifest exists
          fi